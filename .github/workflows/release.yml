name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      update_latest:
        description: "Update latest release"
        required: true
        default: true
        type: boolean

jobs:
  build:
    # 使用矩阵策略，为每个目标架构指定一个匹配的原生 runner
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs_on: ubuntu-latest
            artifact_name: linguaspark-x86_64-linux.tar.gz
          - platform: linux/arm64
            # 使用 GitHub 提供的 arm64 runner
            runs_on: ubuntu-latest-4-cores
            artifact_name: linguaspark-aarch64-linux.tar.gz

    # 从矩阵中获取 runner 类型
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          # 平台仍然指定，但由于 runner 是原生的，buildx 会直接使用主机的 CPU，无需 QEMU
          platforms: ${{ matrix.platform }}
          tags: linguaspark-builder:latest

      - name: Extract compiled libraries from Docker container
        run: |
          mkdir -p artifacts
          docker create --name temp-container linguaspark-builder:latest
          docker cp temp-container:/build/liblinguaspark.so ./artifacts/

          # 根据平台复制正确的 OpenMP 运行时库
          if [[ "${{ matrix.platform }}" == "linux/amd64" ]]; then
            echo "---- Copying Intel OpenMP library (libiomp5.so) for amd64 ----"
            docker cp temp-container:/build/libiomp5.so ./artifacts/
            tar -czvf ${{ matrix.artifact_name }} -C artifacts liblinguaspark.so libiomp5.so
          else
            echo "---- Copying GCC OpenMP library (libgomp.so.1) for arm64 ----"
            docker cp temp-container:/build/libgomp.so.1 ./artifacts/
            tar -czvf ${{ matrix.artifact_name }} -C artifacts liblinguaspark.so libgomp.so.1
          fi
          
          docker rm temp-container

      - name: Upload artifact for ${{ matrix.platform }}
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.platform }}
          path: ${{ matrix.artifact_name }}

  # release 作业保持不变，它会等待所有原生构建完成
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Get version information
        id: get_version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.update_latest }}" == "true" ]]; then
            LATEST_TAG=$(git describe --tags --abbrev=0)
            echo "VERSION=${LATEST_TAG#v}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=latest" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
            echo "TAG_NAME=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        uses: ncipollo/release-action@v1
        with:
          name: Release ${{ steps.get_version.outputs.VERSION }}
          tag: ${{ steps.get_version.outputs.TAG_NAME }}
          allowUpdates: true
          artifacts: "release-artifacts/*.tar.gz"
